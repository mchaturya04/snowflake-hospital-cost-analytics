name: 'hospital_cost_analytics'
version: '1.0.0'
config-version: 2

profile: 'hospital_cost_analytics'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  hospital_cost_analytics:
    staging:
      +materialized: view       # staging models are views — no storage cost
      +schema: staging
    marts:
      +materialized: table      # mart models are tables — fast for dashboards
      +schema: marts
